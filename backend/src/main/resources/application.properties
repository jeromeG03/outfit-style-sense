
# Database Configuration
# Spring Boot automatically uses SPRING_DATASOURCE_* environment variables
spring.datasource.url=jdbc:mysql://localhost:3306/outfit_recommendation_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8&useUnicode=true
spring.datasource.username=root
spring.datasource.password=ProjectMCA@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
# Spring Boot automatically uses SPRING_JPA_* environment variables
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.connection.CharSet=utf8
spring.jpa.properties.hibernate.connection.characterEncoding=utf8
spring.jpa.properties.hibernate.connection.useUnicode=true

# Server Configuration
# Railway provides PORT environment variable automatically
server.port=${PORT:8080}

# HTTP Encoding Configuration for UTF-8 support
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=16MB
spring.servlet.multipart.max-request-size=32MB

# API4.AI Virtual Try-On Configuration
api4ai.api.key=a4a-FRz5VYXZdfFZASc9Jxx0jfMQdj1JZjaM
api4ai.api.url=https://api4ai.cloud/virtual-try-on/v1/results

# Email Configuration - SendGrid HTTP API (works on Railway!)
# Railway blocks SMTP ports (25, 465, 587) so we use HTTP API instead
# Sign up: https://sendgrid.com/ (free tier: 100 emails/day)
# Get API key from: https://app.sendgrid.com/settings/api_keys
# Verify sender: https://app.sendgrid.com/settings/sender_auth/senders
sendgrid.api.key=${SENDGRID_API_KEY:}
spring.mail.from=${SPRING_MAIL_FROM:jerome322001@gmail.com}

